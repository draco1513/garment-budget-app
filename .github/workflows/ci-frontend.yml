name: CI — Garment Budget Frontend

on:
  workflow_dispatch:
    # Ejecuta este workflow manualmente desde la pestaña Actions cuando quieras.
    # Evita que se dispare automáticamente en cada push o PR mientras no tengas el backend listo.

jobs:

  # ── Job 1: Build y Tests ──────────────────────────────────────────────
  build-and-test:
    name: Build + Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint || true   # no bloquear en warnings de lint

      - name: Tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build producción
        run: npm run build

      - name: Verificar tamaño del bundle
        run: |
          SIZE=$(du -sk dist/garment-budget-app | cut -f1)
          echo "Tamaño del bundle: ${SIZE}KB"
          # Alertar si supera 5MB
          if [ $SIZE -gt 5120 ]; then
            echo "⚠️ Bundle supera 5MB — revisar imports innecesarios"
          fi

  # ── Job 2: Docker Build y Push ────────────────────────────────────────
  docker:
    name: Build y Push Docker
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/garment-budget-frontend:latest
            ghcr.io/${{ github.repository_owner }}/garment-budget-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
